<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vahinkohallinta - Tuonti</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Outfit', sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      max-width: 500px;
      padding: 2rem 1.5rem;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
    }
    h1 {
      font-family: 'Cormorant Garamond', 'Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      color: #0a4272;
      margin: 0 0 0.5rem;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 2rem;
    }
    .dropzone {
      border: 2px dashed #0a4272;
      border-radius: 12px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(10, 66, 114, 0.02);
    }
    .dropzone:hover {
      border-color: #d4af37;
      background: rgba(212, 175, 55, 0.06);
    }
    .dropzone.active {
      border-color: #d4af37;
      background: rgba(212, 175, 55, 0.12);
    }
    .dropzone-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .dropzone-text {
      font-size: 16px;
      font-weight: 500;
      color: #0a4272;
      margin-bottom: 6px;
    }
    .dropzone-hint {
      font-size: 13px;
      color: #999;
    }
    input[type="file"] {
      display: none;
    }
    .button {
      background: #0a4272;
      color: white;
      border: none;
      padding: 13px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      width: 100%;
      transition: all 0.2s;
    }
    .button:hover {
      background: #063250;
    }
    .button:active {
      transform: scale(0.98);
    }
    .status {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 12px;
      display: none;
    }
    .status.show {
      display: block;
    }
    .status.success {
      background: rgba(76, 175, 80, 0.08);
      border-left: 4px solid #4CAF50;
    }
    .status.error {
      background: rgba(244, 67, 54, 0.08);
      border-left: 4px solid #F44336;
    }
    .status-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 10px;
    }
    .status.success .status-title {
      color: #1B5E20;
    }
    .status.error .status-title {
      color: #B71C1C;
    }
    .status-message {
      font-size: 13px;
      line-height: 1.6;
      margin: 0;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .status.success .status-message {
      color: #1B5E20;
    }
    .status.error .status-message {
      color: #B71C1C;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 1rem 0;
    }
    .stat-card {
      background: rgba(10, 66, 114, 0.05);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid rgba(10, 66, 114, 0.1);
    }
    .stat-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #0a4272;
    }
    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 2rem 0;
    }
    .info-box {
      background: rgba(10, 66, 114, 0.04);
      border: 1px solid rgba(10, 66, 114, 0.15);
      padding: 1rem;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
      line-height: 1.7;
    }
    .info-box strong {
      color: #0a4272;
      display: block;
      margin-bottom: 8px;
    }
    .info-box ol {
      margin: 8px 0 0;
      padding-left: 20px;
    }
    .info-box li {
      margin: 4px 0;
    }
    .client-list {
      margin-top: 1rem;
      font-size: 13px;
    }
    .client-item {
      padding: 8px;
      background: #f9f9f9;
      border: 1px solid rgba(10, 66, 114, 0.1);
      border-radius: 6px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .client-name {
      color: #0a4272;
      font-weight: 500;
    }
    .client-count {
      background: rgba(212, 175, 55, 0.2);
      color: #d4af37;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .success-note {
      margin-top: 1rem;
      padding: 12px;
      background: rgba(76, 175, 80, 0.1);
      border-radius: 8px;
      font-size: 13px;
      color: #1B5E20;
      border-left: 3px solid #4CAF50;
    }
    .debug-box {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 8px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 11px;
      margin-top: 12px;
      max-height: 250px;
      overflow-y: auto;
      color: #555;
      border: 1px solid #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vahinkohallinta</h1>
    <p class="subtitle">Tuonti-työkalu (Mac · iPad · iPhone)</p>
    
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">📄</div>
      <div class="dropzone-text">Vedä varmuuskopio tähän</div>
      <div class="dropzone-hint">tai klikkaa valitaksesi tiedoston</div>
      <input type="file" id="fileInput" accept=".json" />
    </div>
    
    <button class="button" id="selectBtn">Valitse tiedosto</button>
    
    <div class="divider"></div>
    
    <div class="info-box">
      <strong>📋 Ohje:</strong>
      <ol>
        <li>Lataa backup JSON-tiedostosi</li>
        <li>Sovellus siirtää datan localStorage:iin</li>
        <li>Päivitä Vahinkohallinta-sivu (reload)</li>
        <li>Kaikki vahingot näkyvät takaisin</li>
      </ol>
    </div>
    
    <div class="status" id="status">
      <div class="status-title" id="statusTitle"></div>
      <p class="status-message" id="statusMessage"></p>
      <div class="stats" id="stats"></div>
      <div class="client-list" id="clientList"></div>
      <div class="success-note" id="successNote" style="display:none;"></div>
      <div class="debug-box" id="debugBox" style="display:none;"></div>
    </div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const selectBtn = document.getElementById('selectBtn');
    const status = document.getElementById('status');
    const statusTitle = document.getElementById('statusTitle');
    const statusMessage = document.getElementById('statusMessage');
    const stats = document.getElementById('stats');
    const clientList = document.getElementById('clientList');
    const successNote = document.getElementById('successNote');
    const debugBox = document.getElementById('debugBox');

    selectBtn.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropzone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
      dropzone.addEventListener(eventName, () => dropzone.classList.add('active'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropzone.addEventListener(eventName, () => dropzone.classList.remove('active'), false);
    });

    dropzone.addEventListener('drop', handleDrop, false);
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    function handleDrop(e) {
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFile(files[0]);
      }
    }

    function handleFile(file) {
      if (!file.name.endsWith('.json')) {
        showError('⚠️ Väärä tiedostotyyppi', 'Valitse JSON-tiedosto (.json)');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          validateAndImport(data);
        } catch (err) {
          showError('❌ JSON-virhe', 'Tiedoston lukeminen epäonnistui:\n' + err.message);
        }
      };
      reader.readAsText(file, 'UTF-8');
    }

    function validateAndImport(data) {
      const debug = [];
      
      try {
        debug.push('=== TUONTI ALKAA ===\n');
        
        if (!data) {
          throw new Error('Tiedosto on tyhjä');
        }
        
        debug.push(`Pääavaimet: ${Object.keys(data).join(', ')}\n`);
        
        if (!Array.isArray(data.clients)) {
          throw new Error(`clients pitää olla array, saatiin ${typeof data.clients}`);
        }
        debug.push(`✓ Asiakkaat: ${data.clients.length}`);
        
        if (!data.records || typeof data.records !== 'object') {
          throw new Error(`records pitää olla objekti`);
        }
        debug.push(`✓ Records-objekti: ${Object.keys(data.records).length} clientId:tä\n`);
        
        if (data.clients.length === 0) {
          throw new Error('Tiedostossa ei ole asiakkaita');
        }
        
        let totalRecords = 0;
        const clientStats = [];
        const clientNameMap = {};
        
        // Kerää info
        data.clients.forEach((client, idx) => {
          const cid = client.id;
          const records = data.records[cid] || [];
          clientNameMap[cid] = client.nimi;
          
          debug.push(`${idx + 1}. ${client.nimi}: ${records.length} vahinkoa`);
          
          totalRecords += records.length;
          clientStats.push({
            id: cid,
            name: client.nimi || `Client ${idx}`,
            count: records.length
          });
        });
        
        debug.push(`\nYhteensä: ${totalRecords} vahinkoa\n`);
        debug.push('=== TALLENNUS ALKAA ===\n');
        
        // Tuonti - TÄRKEÄ: tallenna asiakkaat ENSIN, sitten vahingot pienemmissä palasissa
        debug.push('1. Tallennetaan asiakkaat...');
        try {
          const key = 'vahinkohallinta_clients_v9';
          localStorage.setItem(key, JSON.stringify(data.clients));
          debug.push(`   ✓ Asiakkaat tallennettu\n`);
        } catch (err) {
          throw new Error(`Asiakkaiden tallennus epäonnistui: ${err.message}`);
        }
        
        debug.push('2. Tallennetaan vahingot per asiakas:\n');
        
        let successCount = 0;
        for (const client of data.clients) {
          const cid = client.id;
          const records = data.records[cid] || [];
          
          if (records.length === 0) {
            debug.push(`   ○ ${client.nimi}: ei vahinkoja`);
            continue;
          }
          
          try {
            const key = `vahinkohallinta_records_${cid}`;
            localStorage.setItem(key, JSON.stringify(records));
            debug.push(`   ✓ ${client.nimi}: ${records.length} vahinko`);
            successCount++;
          } catch (err) {
            debug.push(`   ✗ ${client.nimi}: VIRHE - ${err.message}`);
            // Jatka muille, älä peruuta
          }
        }
        
        debug.push(`\n=== TUONTI VALMIS ===`);
        debug.push(`${successCount}/${data.clients.length} asiakasta tallennettu`);
        debug.push(`Yhteensä: ${totalRecords} vahinkoa\n`);
        
        // Verifiointi
        debug.push('=== VERIFIOINTI ===');
        let verifyCount = 0;
        for (const client of data.clients) {
          const key = `vahinkohallinta_records_${client.id}`;
          const stored = localStorage.getItem(key);
          const count = stored ? JSON.parse(stored).length : 0;
          debug.push(`${client.nimi}: ${count} vahinko`);
          verifyCount += count;
        }
        debug.push(`\nYhteensä tarkistettu: ${verifyCount} vahinkoa`);
        
        showSuccess(data.clients.length, totalRecords, clientStats, debug.join('\n'));
        
      } catch (err) {
        debug.push(`\n❌ VIRHE: ${err.message}`);
        showError('Tuonti epäonnistui', err.message, debug.join('\n'));
      }
    }

    function showSuccess(clientCount, recordCount, clientStats, debugText) {
      status.classList.add('show', 'success');
      statusTitle.textContent = '✅ Tuonti onnistui!';
      
      let message = `${clientCount} asiakasta tuotu\n${recordCount} vahinkoraporttia siirretty`;
      statusMessage.textContent = message;
      
      stats.innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Asiakkaat</div>
          <div class="stat-value">${clientCount}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Vahingot</div>
          <div class="stat-value">${recordCount}</div>
        </div>
      `;
      
      const listHTML = clientStats
        .filter(s => s.count > 0)
        .map(stat => `
          <div class="client-item">
            <span class="client-name">${stat.name}</span>
            <span class="client-count">${stat.count}</span>
          </div>
        `)
        .join('');
      
      if (listHTML) {
        clientList.innerHTML = listHTML;
      }
      
      successNote.textContent = '🔄 Päivitä nyt Vahinkohallinta-sivu selaimessasi nähdäksesi kaikki tiedot.';
      successNote.style.display = 'block';
      
      if (debugText) {
        debugBox.textContent = debugText;
        debugBox.style.display = 'block';
      }
    }

    function showError(title, message, debugText) {
      status.classList.add('show', 'error');
      statusTitle.textContent = title;
      statusMessage.textContent = message;
      stats.innerHTML = '';
      clientList.innerHTML = '';
      successNote.style.display = 'none';
      
      if (debugText) {
        debugBox.textContent = debugText;
        debugBox.style.display = 'block';
      }
    }
  </script>
</body>
</html>
