<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vahinkohallinta - Tuonti (Lite)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      max-width: 500px;
      padding: 2rem 1.5rem;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      color: #0a4272;
      margin: 0 0 0.5rem;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 2rem;
    }
    .dropzone {
      border: 2px dashed #0a4272;
      border-radius: 12px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(10, 66, 114, 0.02);
    }
    .dropzone:hover {
      border-color: #d4af37;
    }
    .dropzone.active {
      border-color: #d4af37;
      background: rgba(212, 175, 55, 0.12);
    }
    .dropzone-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .dropzone-text {
      font-size: 16px;
      font-weight: 500;
      color: #0a4272;
    }
    input[type="file"] {
      display: none;
    }
    .button {
      background: #0a4272;
      color: white;
      border: none;
      padding: 13px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      width: 100%;
    }
    .button:active {
      opacity: 0.85;
    }
    .status {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 12px;
      display: none;
    }
    .status.show {
      display: block;
    }
    .status.success {
      background: rgba(76, 175, 80, 0.08);
      border-left: 4px solid #4CAF50;
    }
    .status.error {
      background: rgba(244, 67, 54, 0.08);
      border-left: 4px solid #F44336;
    }
    .status-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 10px;
      color: #1B5E20;
    }
    .status.error .status-title {
      color: #B71C1C;
    }
    .status-message {
      font-size: 13px;
      line-height: 1.6;
      color: #1B5E20;
      white-space: pre-wrap;
    }
    .status.error .status-message {
      color: #B71C1C;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      margin: 12px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #4CAF50;
      width: 0%;
      transition: width 0.2s;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0;
    }
    .stat-card {
      background: #f0f0f0;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 600;
      color: #0a4272;
    }
    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 2rem 0;
    }
    .info-box {
      background: rgba(10, 66, 114, 0.04);
      border: 1px solid rgba(10, 66, 114, 0.15);
      padding: 1rem;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vahinkohallinta</h1>
    <p class="subtitle">Tuonti-työkalu (Lite - ilman kuvia)</p>
    
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">📄</div>
      <div class="dropzone-text">Vedä varmuuskopio tähän</div>
      <input type="file" id="fileInput" accept=".json" />
    </div>
    
    <button class="button" id="selectBtn">Valitse tiedosto</button>
    
    <div class="divider"></div>
    
    <div class="info-box">
      <strong>⚡ Lite-versio:</strong><br>
      Tuodaan VAIN vahingot ja asiakkaat<br>
      (kuvat poistetaan pois)<br><br>
      Kuvien tuomiseen käytä pääsovellusta sen jälkeen kun vahingot on tuotu.
    </div>
    
    <div class="status" id="status">
      <div class="status-title" id="statusTitle"></div>
      <div class="progress-bar" id="progressBar" style="display: none;">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="status-message" id="statusMessage"></p>
      <div class="stats" id="stats"></div>
    </div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const selectBtn = document.getElementById('selectBtn');
    const status = document.getElementById('status');
    const statusTitle = document.getElementById('statusTitle');
    const statusMessage = document.getElementById('statusMessage');
    const stats = document.getElementById('stats');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    selectBtn.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => 
      dropzone.addEventListener(e, preventDefaults, false)
    );

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(e =>
      dropzone.addEventListener(e, () => dropzone.classList.add('active'), false)
    );

    ['dragleave', 'drop'].forEach(e =>
      dropzone.addEventListener(e, () => dropzone.classList.remove('active'), false)
    );

    dropzone.addEventListener('drop', e => {
      if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      if (!file.name.endsWith('.json')) {
        showError('❌ Väärä tiedostotyyppi', 'Valitse .json-tiedosto');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          processImport(data);
        } catch (err) {
          showError('❌ JSON-virhe', err.message);
        }
      };
      reader.readAsText(file, 'UTF-8');
    }

    function processImport(data) {
      status.classList.add('show', 'success');
      statusTitle.textContent = '⏳ Tuonti käynnissä...';
      statusMessage.textContent = 'Poistetaan kuvat ja tuodaan vahingot...';
      progressBar.style.display = 'block';

      setTimeout(() => {
        try {
          // Poista base64-kuvat
          const cleanedRecords = {};
          
          for (const [clientId, records] of Object.entries(data.records || {})) {
            cleanedRecords[clientId] = records.map(rec => {
              const cleaned = { ...rec };
              // Poista kuvadataa, säilytä nimet
              if (cleaned.files && Array.isArray(cleaned.files)) {
                cleaned.files = cleaned.files.map(f => {
                  if (typeof f === 'object' && f.data) {
                    return { name: f.name, date: f.date }; // Poista data
                  }
                  return f;
                });
              }
              return cleaned;
            });
          }

          progressFill.style.width = '50%';

          // Tallenna asiakkaat
          localStorage.setItem('vahinkohallinta_v9_clients', JSON.stringify(data.clients));

          progressFill.style.width = '75%';

          // Tallenna vahingot (ilman kuva-dataa)
          let successCount = 0;
          for (const client of data.clients) {
            const records = cleanedRecords[client.id] || [];
            if (records.length > 0) {
              localStorage.setItem(`vahingot_v9_${client.id}`, JSON.stringify(records));
              successCount++;
            }
          }

          progressFill.style.width = '95%';

          // Verifiointi
          let totalRecs = 0;
          const stats_data = [];
          
          for (const client of data.clients) {
            const stored = localStorage.getItem(`vahingot_v9_${client.id}`);
            const count = stored ? JSON.parse(stored).length : 0;
            totalRecs += count;
            if (count > 0) {
              stats_data.push({ name: client.nimi, count });
            }
          }

          progressFill.style.width = '100%';

          setTimeout(() => {
            status.classList.remove('success');
            status.classList.add('show', 'success');
            statusTitle.textContent = '✅ Tuonti onnistui!';
            statusMessage.textContent = `${data.clients.length} asiakasta\n${totalRecs} vahinkoa\n\n💾 Kuvat poistettu (säästä tilaa)\n🔄 Päivitä Vahinkohallinta-sivu`;
            progressBar.style.display = 'none';
            
            stats.innerHTML = stats_data.map(s => `
              <div class="stat-card">
                <div class="stat-label">${s.name.substring(0, 15)}</div>
                <div class="stat-value">${s.count}</div>
              </div>
            `).join('');
          }, 300);

        } catch (err) {
          showError('❌ Tuonti epäonnistui', err.message);
        }
      }, 100);
    }

    function showError(title, message) {
      status.classList.add('show');
      status.classList.remove('success');
      status.classList.add('error');
      statusTitle.textContent = title;
      statusMessage.textContent = message;
      progressBar.style.display = 'none';
      stats.innerHTML = '';
    }
  </script>
</body>
</html>
