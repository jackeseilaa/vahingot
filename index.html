<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a4272">
<!-- v8.1 -->
<title>Vahinkorekisteri</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0a4272;--navy2:#1a5a9e;--gold:#d4af37;
  --green:#28a745;--red:#dc3545;--orange:#fd7e14;
  --bg:#f0f4f8;--white:#fff;
  --gray1:#f8f9fa;--gray2:#e9ecef;--gray3:#dee2e6;--gray5:#adb5bd;--gray6:#6c757d;
  --text:#212529;--text2:#6c757d;
  --shadow:0 2px 12px rgba(10,66,114,.1);
  --r:10px;
}
html{height:100%;height:-webkit-fill-available}body{height:100%;height:-webkit-fill-available;overflow:hidden;position:fixed;width:100%;max-width:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}

/* ── LOGIN ── */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--navy),var(--navy2));z-index:999}
#login.gone{display:none}
.lbox{background:var(--white);border-radius:20px;padding:28px 28px;width:90%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.lbox h1{color:var(--navy);font-size:20px;margin:6px 0 4px}
.lbox p{color:var(--text2);font-size:13px;margin-bottom:20px}
.pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
.pbox{width:52px;height:52px;border:2px solid var(--gray3);border-radius:12px;
  font-size:26px;font-weight:700;text-align:center;color:var(--navy);background:var(--white)}
.pbox:focus{outline:none;border-color:var(--navy);background:var(--gray1)}
#perr{color:var(--red);font-size:14px;min-height:20px;margin-bottom:8px}
.lbtn{width:100%;padding:14px;background:var(--navy);color:var(--white);
  border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.lbtn:active{opacity:.85}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available}
.app-header{
  background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--white);
  padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.app-header h1{font-size:16px;font-weight:700;letter-spacing:-.2px}
.app-header small{font-size:12px;opacity:.75;display:block;margin-top:1px}
.hbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);
  color:var(--white);padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.hbtn:active{background:rgba(255,255,255,.25)}
.hbtns{display:flex;gap:8px}

.body{flex:1;display:flex;overflow:hidden;overflow-x:hidden}

/* ── SIDEBAR ── */
.sidebar{width:256px;background:var(--white);border-right:1px solid var(--gray2);
  flex-shrink:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:20px}
@media(max-width:768px){.sidebar{display:none}}
.sb-title{font-size:11px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text2);font-weight:700;margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.scard{background:var(--gray1);border-radius:8px;padding:10px 8px;text-align:center;
  border-left:3px solid var(--navy)}
.scard .n{font-size:24px;font-weight:700;color:var(--navy)}
.scard .l{font-size:11px;color:var(--text2)}
.scard.green{border-left-color:var(--green)}
.scard.orange{border-left-color:var(--orange)}
.scard.red{border-left-color:var(--red)}

.finput,.fselect{
  width:100%;padding:9px 10px;border:1px solid var(--gray3);
  border-radius:8px;font-size:14px;background:var(--white);margin-bottom:8px;
  font-family:inherit}
.finput:focus,.fselect:focus{outline:none;border-color:var(--navy)}
.sbtn{
  width:100%;padding:10px;border:none;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;font-family:inherit}
.sbtn:active{opacity:.85}
.sbtn.navy{background:var(--navy);color:var(--white)}
.sbtn.green{background:var(--green);color:var(--white)}
.sbtn.gray{background:var(--gray2);color:var(--text)}
.sbtn.red{background:var(--red);color:var(--white)}

/* ── MAIN AREA ── */
.main-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
.mbar{display:none;padding:8px 10px;background:var(--white);
  border-bottom:1px solid var(--gray2);gap:8px;flex-wrap:wrap}
@media(max-width:768px){.mbar{display:flex}}
.mbar input,.mbar select{
  flex:1;min-width:120px;padding:8px 10px;
  border:1px solid var(--gray3);border-radius:8px;font-size:14px;font-family:inherit}
.mbtn{padding:8px 14px;border:none;border-radius:8px;
  background:var(--navy);color:var(--white);font-size:13px;font-weight:700;cursor:pointer}

.tarea{flex:1;overflow-y:auto;padding:10px}
table{width:100%;border-collapse:separate;border-spacing:0;background:var(--white);
  border-radius:12px;overflow:hidden;box-shadow:var(--shadow);table-layout:fixed}
thead{position:sticky;top:0;z-index:1}
th{background:var(--navy);color:var(--white);padding:9px 12px;
  text-align:left;font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.3px;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{background:var(--navy2)}
th.asc::after{content:' ▲';color:var(--gold);font-size:10px}
th.desc::after{content:' ▼';color:var(--gold);font-size:10px}
tbody tr{cursor:pointer;border-bottom:1px solid var(--gray2);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#eef3f8}
tbody tr:active{background:var(--gray2)}
td{padding:8px 12px;font-size:14px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0}
.empty-row td{text-align:center;padding:40px;color:var(--gray5)}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.b-avoin{background:#fde8ea;color:#a71d2a}
.b-käsittelyssä{background:#fff3cd;color:#856404}
.b-käsitelty{background:#d4edda;color:#155724}
.b-arkistoitu{background:var(--gray2);color:#383d41}

.imgcount{font-size:13px;color:var(--text2)}
.imgcount.has{color:var(--navy);font-weight:700}

/* Mobile footer */
.mfooter{display:none;background:var(--white);border-top:1px solid var(--gray2);
  padding:8px 12px;gap:8px}
@media(max-width:768px){.mfooter{display:flex}}
.mfooter button{flex:1;padding:9px 4px;border:none;border-radius:8px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── MODAL ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:500;align-items:center;justify-content:center;padding:16px}
#overlay.on{display:flex}
.mbox{background:var(--white);border-radius:16px;width:100%;max-width:580px;
  max-height:92vh;overflow-y:auto;padding:28px}
@media(max-width:768px){
  .mbox{border-radius:20px 20px 0 0;align-self:flex-end;max-height:92vh;padding:20px}
  #overlay{align-items:flex-end;padding:0}
}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.mhead h2{color:var(--navy);font-size:19px;font-weight:700}
.mclose{background:var(--gray2);border:none;width:32px;height:32px;
  border-radius:50%;cursor:pointer;font-size:16px;color:var(--text)}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.3px;color:var(--text2);margin-bottom:6px}
.fg input,.fg select,.fg textarea{
  width:100%;padding:10px 12px;border:1px solid var(--gray3);
  border-radius:8px;font-size:15px;font-family:inherit;background:var(--white)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--navy)}
.fg textarea{min-height:72px;resize:vertical}

.nitem{display:flex;align-items:flex-start;gap:8px;background:#fff8e1;
  border-left:3px solid var(--gold);padding:9px 10px;border-radius:6px;margin-bottom:6px;font-size:14px}
.nitem span{flex:1}
.ndel{background:none;border:none;cursor:pointer;color:var(--red);font-size:18px;padding:0;line-height:1}
.nadd-row{display:flex;gap:8px}
.nadd-row input{flex:1;padding:9px 10px;border:1px solid var(--gray3);
  border-radius:8px;font-size:14px;font-family:inherit}
.nadd-row input:focus{outline:none;border-color:var(--navy)}
.nadd-btn{padding:9px 14px;background:var(--navy);color:var(--white);
  border:none;border-radius:8px;font-weight:700;cursor:pointer;white-space:nowrap}
.nadd-btn:active{opacity:.85}

.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;margin-bottom:10px}
.ithumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--gray1)}
.ithumb img{width:100%;height:100%;object-fit:cover}
.idel{position:absolute;top:3px;right:3px;background:rgba(220,53,69,.9);
  border:none;color:var(--white);width:22px;height:22px;border-radius:50%;
  cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.ifile{background:var(--gray1);border:2px dashed var(--gray3);border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  aspect-ratio:1;color:var(--text2);font-size:11px;text-align:center;padding:6px}

.addimgbtn{width:100%;padding:11px;background:var(--gray1);border:2px dashed var(--gray3);
  border-radius:8px;cursor:pointer;color:var(--navy);font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.addimgbtn:hover{background:var(--gray2);border-color:var(--navy)}
.addimgbtn:active{opacity:.85}

.mfooter2{display:flex;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--gray2)}
.bsave{flex:2;padding:13px;background:var(--green);color:var(--white);
  border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.bsave:active{opacity:.85}
.bcancel{flex:1;padding:13px;background:var(--gray2);color:var(--text);
  border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.bcancel:active{opacity:.85}

@media(max-width:768px){
  td:nth-child(3){display:none}th:nth-child(3){display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <div style="font-size:32px">🛡️</div>
    <h1>Vahinkorekisteri</h1>
    <p>Vakuutusmeklarin aineistonhallinta<br><small style="color:#aaa">AJarmo Oy | J Sailing Tmi</small></p>
    <div id="perr"></div>
    <div class="pin-row" id="pinRow"></div>
    <button class="lbtn" onclick="tryLogin()">Kirjaudu sisään</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <div>
      <h1>📋 Vahinkorekisteri</h1>
      <small id="hstats">—</small>
        <small style="opacity:.5;font-size:10px">v8.8</small>
    </div>
    <div class="hbtns">
      <button class="hbtn" onclick="openNew()">＋ Uusi vahinko</button>
      <button class="hbtn" onclick="logout()">Kirjaudu ulos</button>
    </div>
  </header>

  <div class="body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div>
        <div class="sb-title">Tilastot</div>
        <div class="stats-grid">
          <div class="scard"><div class="n" id="st">0</div><div class="l">Yhteensä</div></div>
          <div class="scard red"><div class="n" id="so">0</div><div class="l">Avoimet</div></div>
          <div class="scard orange"><div class="n" id="sp">0</div><div class="l">Käsittelyssä</div></div>
          <div class="scard green"><div class="n" id="sd">0</div><div class="l">Käsitelty</div></div>
        </div>
      </div>
      <div>
        <div class="sb-title">Haku & Suodattimet</div>
        <input class="finput" id="sSearch" placeholder="🔍 Hae kohteella tai tunnuksella..." oninput="renderTable()">
        <select class="fselect" id="sType" onchange="renderTable()">
          <option value="">Kaikki tyypit</option>
          <option>Ajoneuvovahinko</option>
          <option>Liikennevahinko</option>
          <option>Omaisuusvahinko</option>
        </select>
        <select class="fselect" id="sStatus" onchange="renderTable()">
          <option value="">Kaikki tilat</option>
          <option value="avoin">Avoin</option>
          <option>Käsittelyssä</option>
          <option>Käsitelty</option>
          <option>Arkistoitu</option>
        </select>
      </div>
      <div>
        <div class="sb-title">Toiminnot</div>
        <button class="sbtn navy" onclick="openNew()">➕ Uusi vahinko</button>
        <button class="sbtn green" onclick="exportJSON()">💾 Vie JSON iCloud:iin</button>
        <button class="sbtn gray" onclick="document.getElementById('importFile').click()">📂 Lataa JSON iCloud:sta</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
        <button class="sbtn gray" onclick="exportExcel()">📊 Vie Excel</button>
        <button class="sbtn red" onclick="deleteAll()">🗑️ Poista kaikki</button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main-area">
      <!-- Mobile bar -->
      <div class="mbar">
        <input id="mSearch" placeholder="🔍 Hae..." oninput="renderTable()">
        <select id="mStatus" onchange="renderTable()">
          <option value="">Kaikki tilat</option>
          <option value="avoin">Avoin</option>
          <option>Käsittelyssä</option>
          <option>Käsitelty</option>
          <option>Arkistoitu</option>
        </select>
        <button class="mbtn" onclick="openNew()">＋</button>
      </div>

      <div class="tarea">
        <table>
          <colgroup>
            <col style="width:120px">
            <col style="width:110px">
            <col style="width:150px">
            <col style="width:110px">
            <col style="width:180px">
            <col style="width:70px">
          </colgroup>
          <thead>
            <tr>
              <th onclick="setSort('date')" id="th-date">Vahinkopäivä</th>
              <th onclick="setSort('target')" id="th-target">Kohde</th>
              <th onclick="setSort('type')" id="th-type">Tyyppi</th>
              <th onclick="setSort('status')" id="th-status">Tila</th>
              <th onclick="setSort('ref')" id="th-ref">Vahinkotunnus</th>
              <th onclick="setSort('fileCount')" id="th-fileCount">Kuvat</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <!-- Mobile footer -->
      <div class="mfooter">
        <button style="background:var(--green);color:#fff" onclick="exportJSON()">💾 Vie</button>
        <button style="background:var(--gray2)" onclick="document.getElementById('importFile').click()">📂 Lataa</button>
        <button style="background:var(--gray2)" onclick="exportExcel()">📊 Excel</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="overlay">
  <div class="mbox">
    <div class="mhead">
      <h2 id="mTitle">Vahinko</h2>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>

    <div class="fg">
      <label>Vahinkopäivä</label>
      <input type="date" id="fDate">
    </div>
    <div class="fg">
      <label>Kohde</label>
      <input type="text" id="fTarget" placeholder="esim. XPT-996">
    </div>
    <div class="fg">
      <label>Vahinkotyyppi</label>
      <select id="fType">
        <option>Ajoneuvovahinko</option>
        <option>Liikennevahinko</option>
        <option>Omaisuusvahinko</option>
      </select>
    </div>
    <div class="fg">
      <label>Käsittelyn tila</label>
      <select id="fStatus">
        <option value="">Avoin</option>
        <option>Käsittelyssä</option>
        <option>Käsitelty</option>
        <option>Arkistoitu</option>
      </select>
    </div>
    <div class="fg">
      <label>Vahinkotunnus</label>
      <input type="text" id="fRef" placeholder="esim. 24-40326-06478-6">
    </div>
    <div class="fg">
      <label>Muistiinpanot</label>
      <div id="noteList" style="margin-bottom:8px"></div>
      <div class="nadd-row">
        <input type="text" id="noteInput" placeholder="Lisää muistiinpano...">
        <button class="nadd-btn" id="noteAddBtn">Lisää</button>
      </div>
    </div>
    <div class="fg">
      <label>Liitteet & Kuvat</label>
      <div class="igrid" id="imgGrid"></div>
      <button class="addimgbtn" id="addImgBtn">📁 Lisää tiedostoja (kuvat, PDF, Word, Excel...)</button>
      <input type="file" id="fileInput" multiple accept="*/*" style="display:none">
    </div>

    <div class="mfooter2">
      <button class="bcancel" onclick="closeModal()">Peruuta</button>
      <button class="bsave" onclick="saveRecord()">💾 Tallenna</button>
    </div>
  </div>
</div>

/* ── STORAGE ── */
function loadData(){
  try{ const s=localStorage.getItem(KEY); records=s?JSON.parse(s):defaultData(); }
  catch(e){ records=defaultData(); }
}
function saveData(){
  try{ localStorage.setItem(KEY,JSON.stringify(records)); }
  catch(e){ alert('Tallennus epäonnistui — selainmuisti täynnä.\nVie JSON iCloud:iin ensin, sitten poista isoja kuvia.'); }
}

/* ── HELPERS ── */
function fi(iso){if(!iso)return'—';if(iso.includes('.')){return iso;}const[y,m,d]=iso.split('-');if(!d||!m||!y)return iso;return`${d}.${m}.${y}`;;}
function timeSince(ts){
  if(!ts)return'ei koskaan';
  const now=Date.now();
  const diff=now-parseInt(ts);
  const secs=Math.floor(diff/1000);
  const mins=Math.floor(secs/60);
  const hours=Math.floor(mins/60);
  const days=Math.floor(hours/24);
  if(days>0)return days+'d sitten';
  if(hours>0)return hours+'h sitten';
  if(mins>5)return mins+'min sitten';
  return'juuri nyt';
}
function badgeClass(s){if(!s)return'b-avoin';return'b-'+s.toLowerCase().replace(/\s/g,'');}
function badgeLabel(s){return s||'Avoin';}

/* ── PIN ── */
function initPin(){
  const row=document.getElementById('pinRow');
  row.innerHTML='';
  for(let i=0;i<4;i++){
    const b=document.createElement('input');
    b.type='password'; b.className='pbox'; b.maxLength='1'; b.inputMode='numeric';
    b.addEventListener('keyup',e=>{
      if(e.key==='Backspace'){b.value='';if(i>0)row.children[i-1].focus();}
      else if(/[0-9]/.test(e.key)){b.value=e.key;if(i<3)row.children[i+1].focus();else tryLogin();}
    });
    row.appendChild(b);
  }
  row.children[0].focus();
}
function tryLogin(){
  const pin=[...document.querySelectorAll('.pbox')].map(x=>x.value).join('');
  if(pin===PIN){
    document.getElementById('login').classList.add('gone');
    loadData(); renderTable(); updateStats(); updateBackupTime();
  } else {
    document.getElementById('perr').textContent='Väärä PIN-koodi. Yritä uudelleen.';
    document.querySelectorAll('.pbox').forEach(x=>x.value='');
    document.querySelector('.pbox').focus();
  }
}
function logout(){if(confirm('Kirjaudu ulos?'))location.reload();}

/* ── STATS ── */
function updateBackupTime(){
  const ts=localStorage.getItem(KEY+'_lastExport');
  document.getElementById('hstats').textContent=`${records.filter(r=>!r.status).length}/${records.length} − Varmuus: ${timeSince(ts)}`;
}
function updateStats(){
  const n=records.length;
  document.getElementById('st').textContent=n;
  document.getElementById('so').textContent=records.filter(r=>!r.status).length;
  document.getElementById('sp').textContent=records.filter(r=>r.status==='Käsittelyssä').length;
  document.getElementById('sd').textContent=records.filter(r=>r.status==='Käsitelty').length;
  updateBackupTime();
}

/* ── SORT ── */
function setSort(f){
  if(sortField===f)sortAsc=!sortAsc;
  else{sortField=f;sortAsc=true;} // Kaikki field sorttaa ensin ascending
  renderTable();
}

/* ── RENDER TABLE ── */
function renderTable(){
  const q=document.getElementById('sSearch').value.toLowerCase();
  const tf=document.getElementById('sType').value;
  const sf=document.getElementById('sStatus').value;

  let rows=records.filter(r=>{
    const ms=r.target.toLowerCase().includes(q)||(r.ref||'').toLowerCase().includes(q);
    const mt=!tf||r.type===tf;
    const mst=!sf||(sf==='avoin'?!r.status:r.status===sf);
    return ms&&mt&&mst;
  });

  rows.sort((a,b)=>{
    let av,bv;
    if(sortField==='date'){
      // Oikea päivämäärävertailu - tyhjät päivät loppuun
      const da=new Date(a.date||'9999-12-31').getTime();
      const db=new Date(b.date||'9999-12-31').getTime();
      av=da;bv=db;
    } else if(sortField==='fileCount'){
      av=a.files.length;bv=b.files.length;
    } else {
      av=(a[sortField]||'').toLowerCase();bv=(b[sortField]||'').toLowerCase();
    }
    return av<bv?(sortAsc?-1:1):av>bv?(sortAsc?1:-1):0;
  });

  // Sort indicators
  ['date','target','type','status','ref','fileCount'].forEach(f=>{
    const el=document.getElementById('th-'+f);
    if(el)el.className=sortField===f?(sortAsc?'asc':'desc'):'';
  });

  const tbody=document.getElementById('tbody');
  if(!rows.length){
    tbody.innerHTML='<tr class="empty-row"><td colspan="6">Ei vahinkoja</td></tr>';
    updateStats(); return;
  }
  tbody.innerHTML=rows.map(r=>{
    const fc=r.files.length;
    const hasNotes=r.notes.length>0;
    return`<tr data-id="${r.id}">
      <td>${fi(r.date)}</td>
      <td><strong>${r.target}</strong>${hasNotes?' <span style="font-size:12px">📝</span>':''}</td>
      <td>${r.type}</td>
      <td><span class="badge ${badgeClass(r.status)}">${badgeLabel(r.status)}</span></td>
      <td>${r.ref||'—'}</td>
      <td><span class="imgcount${fc?' has':''}">${fc?'🖼 '+fc:'—'}</span></td>
    </tr>`;
  }).join('');

  updateStats();
}

/* ── OPEN / CLOSE MODAL ── */
function openNew(){
  currentId='NEW-'+Date.now(); currentNotes=[]; currentFiles=[];
  document.getElementById('mTitle').textContent='Uusi vahinko';
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('fTarget').value='';
  document.getElementById('fType').value='Ajoneuvovahinko';
  document.getElementById('fStatus').value='';
  document.getElementById('fRef').value='';
  document.getElementById('noteInput').value='';
  renderNotes(); renderImages();
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>document.getElementById('fTarget').focus(),100);
}
function openEdit(id){
  const r=records.find(x=>x.id===id); if(!r)return;
  currentId=id;
  currentNotes=[...r.notes];
  currentFiles=r.files.map(f=>({...f}));
  document.getElementById('mTitle').textContent=r.target;
  document.getElementById('fDate').value=r.date||'';
  document.getElementById('fTarget').value=r.target;
  document.getElementById('fType').value=r.type;
  document.getElementById('fStatus').value=r.status;
  document.getElementById('fRef').value=r.ref||'';
  document.getElementById('noteInput').value='';
  renderNotes(); renderImages();
  document.getElementById('overlay').classList.add('on');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('on');
  currentId=null; currentNotes=[]; currentFiles=[];
}

/* ── NOTES ── */
function renderNotes(){
  document.getElementById('noteList').innerHTML=currentNotes.map((n,i)=>`
    <div class="nitem">
      <span>${n}</span>
      <button class="ndel" data-ni="${i}">✕</button>
    </div>`).join('');
}
function addNote(){
  const inp=document.getElementById('noteInput');
  const v=inp.value.trim(); if(!v)return;
  currentNotes.push(v); inp.value=''; renderNotes();
}

/* ── IMAGES (compressed) ── */
function fileIcon(name){
  const ext=(name.split('.').pop()||'').toLowerCase();
  if(['pdf'].includes(ext))return'📄';
  if(['doc','docx'].includes(ext))return'📝';
  if(['xls','xlsx'].includes(ext))return'📊';
  if(['ppt','pptx'].includes(ext))return'📑';
  if(['txt'].includes(ext))return'📃';
  if(['zip','rar'].includes(ext))return'🗜️';
  return'📎';
}
function renderImages(){
  document.getElementById('imgGrid').innerHTML=currentFiles.map((f,i)=>
    `<div class="ithumb">
      ${f.data.startsWith('data:image')
        ?`<img src="${f.data}" loading="lazy">`
        :`<div class="ifile" style="font-size:28px;flex-direction:column;gap:4px">
            ${fileIcon(f.name)}
            <small style="font-size:10px;word-break:break-all;color:#555">${f.name.slice(0,16)}</small>
          </div>`}
      <button class="idel" data-ii="${i}">✕</button>
    </div>`
  ).join('');
}
function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1200;
        const ratio=Math.min(MAX/img.width,MAX/img.height,1);
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*ratio);
        c.height=Math.round(img.height*ratio);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        resolve({name:file.name,data:c.toDataURL('image/jpeg',.82)});
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function handleFiles(files){
  const tasks=[...files].map(f=>
    f.type.startsWith('image/')?compressImage(f):new Promise(res=>{
      const r=new FileReader();
      r.onload=e=>res({name:f.name,data:e.target.result});
      r.readAsDataURL(f);
    })
  );
  Promise.all(tasks).then(results=>{
    currentFiles.push(...results);
    renderImages();
  });
}

/* ── SAVE ── */
function saveRecord(){
  const target=document.getElementById('fTarget').value.trim();
  if(!target){alert('Syötä kohde!');document.getElementById('fTarget').focus();return;}
  const rec={
    id:currentId,
    date:document.getElementById('fDate').value,
    target,
    type:document.getElementById('fType').value,
    status:document.getElementById('fStatus').value,
    ref:document.getElementById('fRef').value.trim(),
    notes:[...currentNotes],
    files:[...currentFiles]
  };
  const idx=records.findIndex(r=>r.id===currentId);
  if(idx>=0)records[idx]=rec; else records.push(rec);
  saveData(); closeModal(); renderTable();
}

/* ── DELETE ── */
function deleteRecord(id){
  if(confirm('Poista vahinko?')){
    records=records.filter(r=>r.id!==id);
    saveData(); renderTable();
  }
}
function deleteAll(){
  if(confirm('Poista KAIKKI vahingot?\n\nTätä ei voi perua!')){
    records=[]; saveData(); renderTable();
  }
}

/* ── EXPORT / IMPORT ── */
function exportJSON(){
  const json=JSON.stringify(records,null,2);
  const mb=(new Blob([json]).size/1024/1024).toFixed(1);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
  a.download=`vahingot_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  // Tallenna export-aika
  localStorage.setItem(KEY+'_lastExport',Date.now());
  updateBackupTime();
  alert(`✅ Tiedosto ladattu (${mb} MB)\n\nSynkronointi toiselle laitteelle:\n1. Avaa Files-app → iCloud Drive\n2. Tallenna tiedosto sinne\n3. Toisella laitteella: avaa tämä sovellus\n4. Paina "📂 Lataa JSON iCloud:sta"\n5. Valitse sama tiedosto`);
}
function exportExcel(){
  const ws=XLSX.utils.json_to_sheet(records.map(r=>({
    'Päivä':fi(r.date),'Kohde':r.target,'Tyyppi':r.type,
    'Tila':badgeLabel(r.status),'Vahinkotunnus':r.ref||'',
    'Muistiinpanot':r.notes.join('; '),'Liitteet':r.files.length
  })));
  ws['!cols']=[10,14,20,14,24,40,8].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Vahingot');
  XLSX.writeFile(wb,`vahingot_${new Date().toISOString().slice(0,10)}.xlsx`);
}
function toISO(d){
  if(!d)return'';
  if(d.includes('-'))return d; // jo ISO-muodossa
  if(d.includes('.')){const[dd,mm,yy]=d.split('.');return`${yy}-${mm}-${dd}`;}
  return d;
}
function importFromFile(){
  const input=document.getElementById('importFile');
  const file=input.files[0];
  if(!file){return;}
  const r=new FileReader();
  r.onload=e=>{
    input.value='';
    let data;
    // Vaihe 1: JSON-parsinta
    try{
      data=JSON.parse(e.target.result);
    }catch(err){
      alert('❌ JSON-parsinta epäonnistui.\nTiedosto on viallinen tai väärä tiedosto.');
      return;
    }
    // Vaihe 2: Rakenne
    if(!Array.isArray(data)){
      alert('❌ Tiedoston rakenne on väärä (ei taulukko).');
      return;
    }
    // Vaihe 3: Varmistus
    if(!confirm('Tuodaan ' + data.length + ' vahinkoa.\n\nKorvataanko nykyiset tiedot?')) return;
    // Vaihe 4: Normalisoi rakenne (tue vanhoja versioita)
    data=data.map(r=>({
      id:r.id||('IMP-'+Date.now()+Math.random()),
      date:toISO(r.date||r.vahinkopäivä||''),
      target:r.target||r.kohde||'',
      type:r.type||r.tyyppi||'Ajoneuvovahinko',
      status:r.status||r.käsittelyn_tila||'',
      ref:r.ref||r.vahinkotunnus||'',
      notes:r.notes||r.muistiinpanot||[],
      files:r.files||r.liitteet||[]
    }));
    // Vaihe 5: Tallenna
    try{
      localStorage.setItem(KEY,JSON.stringify(data));
      records=data;
    }catch(err){
      // localStorage täynnä - yritä ilman kuvia
      if(confirm('⚠️ Selainmuisti täynnä (kuvien takia).\n\nTuodaanko tiedot ILMAN kuvia?')){
        const dataNoFiles=data.map(r=>({...r,files:[]}));
        try{
          localStorage.setItem(KEY,JSON.stringify(dataNoFiles));
          records=dataNoFiles;
          alert('✅ Tuonti onnistui (ilman kuvia) — ' + dataNoFiles.length + ' vahinkoa.');
          renderTable(); return;
        }catch(e2){
          alert('❌ Tallennus epäonnistui kokonaan. Selainmuisti on täynnä.');
          return;
        }
      } else return;
    }
    // Vaihe 6: Päivitä näkymä
    renderTable();
    updateBackupTime();
    alert('✅ Tuonti onnistui! ' + data.length + ' vahinkoa ladattu.');
  };
  r.onerror=()=>{
    input.value='';
    alert('❌ Tiedostoa ei voitu lukea.');
  };
  r.readAsText(file, 'UTF-8');
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',()=>{
  // Aseta versio
  const versionEl=document.querySelector('small[style*="opacity"]');
  if(versionEl&&versionEl.textContent.includes('v'))versionEl.textContent='v'+VERSION;

  initPin();

  // Table row click (event delegation)
  document.getElementById('tbody').addEventListener('click',e=>{
    const row=e.target.closest('tr[data-id]');
    if(row)openEdit(row.dataset.id);
  });

  // Note list delete (event delegation)
  document.getElementById('noteList').addEventListener('click',e=>{
    const btn=e.target.closest('[data-ni]');
    if(btn){currentNotes.splice(+btn.dataset.ni,1);renderNotes();}
  });

  // Image delete (event delegation)
  document.getElementById('imgGrid').addEventListener('click',e=>{
    const btn=e.target.closest('[data-ii]');
    if(btn){currentFiles.splice(+btn.dataset.ii,1);renderImages();}
  });

  // Add image button
  document.getElementById('addImgBtn').addEventListener('click',()=>{
    document.getElementById('fileInput').click();
  });

  // File input change
  document.getElementById('fileInput').addEventListener('change',function(){
    if(this.files.length){handleFiles(this.files);}
    this.value='';
  });

  // Import file change
  document.getElementById('importFile').addEventListener('change',importFromFile);

  // Note add button
  document.getElementById('noteAddBtn').addEventListener('click',addNote);

  // Note input Enter
  document.getElementById('noteInput').addEventListener('keyup',e=>{
    if(e.key==='Enter')addNote();
  });

  // Close modal on overlay background click
  document.getElementById('overlay').addEventListener('click',e=>{
    if(e.target===document.getElementById('overlay'))closeModal();
  });

  // Sync search inputs sidebar <-> mobile
  document.getElementById('sSearch').addEventListener('input',function(){
    document.getElementById('mSearch').value=this.value;
  });
  document.getElementById('mSearch').addEventListener('input',function(){
    document.getElementById('sSearch').value=this.value;
  });
  document.getElementById('sStatus').addEventListener('change',function(){
    document.getElementById('mStatus').value=this.value;
  });
  document.getElementById('mStatus').addEventListener('change',function(){
    document.getElementById('sStatus').value=this.value;
  });
});
</script>
