<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vahinkorekisteri</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#f5f5f5}
header{background:#0a4272;color:white;padding:2rem}
main{max-width:1200px;margin:0 auto;padding:2rem}
table{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
th,td{padding:1rem;text-align:left;border-bottom:1px solid #ddd}
th{background:#0a4272;color:white}
tr:hover{background:#f9f9f9;cursor:pointer}
.badge{padding:0.25rem 0.75rem;border-radius:20px;font-size:0.8rem;font-weight:bold}
.käsitelty{background:#d1fae5;color:#065f46}
.käsittelyssä{background:#fef3c7;color:#92400e}
.avoin{background:#fee2e2;color:#991b1b}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:white;padding:2rem;border-radius:8px;max-width:700px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.modal-content h3{color:#0a4272;margin-bottom:1.5rem;font-size:1.3rem}
.field{margin-bottom:1.5rem}
.field label{display:block;font-weight:bold;color:#333;margin-bottom:0.5rem}
.field p{background:#f5f5f5;padding:0.75rem;border-radius:4px}
textarea{width:100%;padding:0.75rem;border:1px solid #ddd;border-radius:4px;font-family:Arial;resize:vertical;min-height:80px}
.muistiinpano{background:#fff3cd;border-left:4px solid #ffc107;padding:1rem;margin-bottom:1rem;border-radius:4px}
.muistiinpano-teksti{margin-bottom:0.5rem;color:#333}
.muistiinpano-buttons{display:flex;gap:0.5rem}
.muistiinpano-buttons button{padding:0.4rem 0.8rem;font-size:0.8rem;cursor:pointer}
.btn-delete{background:#dc3545;color:white;border:none;border-radius:4px;padding:0.4rem 0.8rem;cursor:pointer}
.btn-delete:hover{background:#c82333}
.liitteet{margin-top:2rem;padding-top:2rem;border-top:1px solid #ddd}
.liitteet h4{color:#0a4272;margin-bottom:1rem}
.liite-item{background:#f9f9f9;padding:1rem;border-radius:4px;margin-bottom:0.75rem;display:flex;justify-content:space-between;align-items:center}
.liite-name{color:#333;font-weight:bold}
.file-input{display:none}
button{background:#0a4272;color:white;padding:0.75rem 1.5rem;border:none;border-radius:4px;cursor:pointer;font-size:0.9rem}
button:hover{background:#0a3050}
.btn-secondary{background:#6c757d}
.btn-secondary:hover{background:#5a6268}
</style>
</head>
<body>
<header><h1>📋 Vahinkorekisteri</h1></header>
<main>
<table>
<thead><tr><th>Päivä</th><th>Kohde</th><th>Tyyppi</th><th>Tila</th><th>Tunnus</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</main>

<div id="modal" class="modal">
<div class="modal-content">
<h3 id="modalTitle"></h3>
<div class="field"><label>Päivä</label><p id="modalPäivä">—</p></div>
<div class="field"><label>Tyyppi</label><p id="modalTyyppi">—</p></div>
<div class="field"><label>Tila</label><p id="modalTila">—</p></div>
<div class="field"><label>Vahinkotunnus</label><p id="modalTunnus">—</p></div>

<div class="field">
<label>Muistiinpanot</label>
<div id="muistiinpanot"></div>
<textarea id="uusiMuistiinpano" placeholder="Lisää uusi muistiinpano..."></textarea>
<button onclick="lisääMuistiinpano()" style="margin-top:0.5rem">Lisää muistiinpano</button>
</div>

<div class="liitteet">
<h4>Liitteet</h4>
<div id="liitteet"></div>
<button onclick="document.getElementById('fileInput').click()" class="btn-secondary">Lisää liite</button>
<input type="file" id="fileInput" class="file-input" onchange="lisääLiite()">
</div>

<div style="margin-top:2rem;display:flex;gap:1rem">
<button onclick="closeModal()" class="btn-secondary">Sulje</button>
</div>
</div>
</div>

function render(){
  const html=data.map(v=>`<tr onclick="openModal(${v.id})"><td>${v.päivä}</td><td><strong>${v.kohde}</strong></td><td>${v.tyyppi}</td><td><span class="badge ${v.tila==='Käsitelty'?'käsitelty':v.tila==='Käsittelyssä'?'käsittelyssä':'avoin'}">${v.tila||'Avoin'}</span></td><td>${v.tunnus||'—'}</td></tr>`).join('');
  document.getElementById('tbody').innerHTML=html;
}

function openModal(id){
  currentVahinkoId=id;
  const v=data[id];
  document.getElementById('modalTitle').textContent=v.kohde;
  document.getElementById('modalPäivä').textContent=v.päivä||'—';
  document.getElementById('modalTyyppi').textContent=v.tyyppi;
  document.getElementById('modalTila').textContent=v.tila||'Avoin';
  document.getElementById('modalTunnus').textContent=v.tunnus||'—';
  
  // Muistiinpanot
  const muistiinpanotHtml=v.muistiinpanot.map((m,i)=>`<div class="muistiinpano"><div class="muistiinpano-teksti">"${m}"</div><div class="muistiinpano-buttons"><button class="btn-delete" onclick="poistaMuistiinpano(${i})">Poista</button></div></div>`).join('');
  document.getElementById('muistiinpanot').innerHTML=muistiinpanotHtml;
  document.getElementById('uusiMuistiinpano').value='';
  
  // Liitteet
  const liitteetHtml=v.liitteet.map((l,i)=>`<div class="liite-item"><span class="liite-name">📎 ${l.name}</span><button class="btn-delete" onclick="poistaLiite(${i})">Poista</button></div>`).join('');
  document.getElementById('liitteet').innerHTML=liitteetHtml||'<p style="color:#999">Ei liitteitä</p>';
  
  document.getElementById('modal').classList.add('active');
}
