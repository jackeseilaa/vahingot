<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vahinkorekisteri v7</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: #0a4272; color: white; padding: 20px; margin: -20px -20px 20px -20px; }
        h1 { margin: 0; }
        .version { font-size: 0.9rem; opacity: 0.8; }
        table { width: 100%; background: white; border-collapse: collapse; margin: 20px 0; }
        th { background: #0a4272; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f9f9f9; }
        button { padding: 8px 16px; background: #0a4272; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #1a5a9e; }
        .success { background: #28a745; }
        .success:hover { background: #218838; }
        .danger { background: #dc3545; }
        .danger:hover { background: #c82333; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .liite { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .liite img { max-width: 100%; height: auto; }
        .section { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Vahinkorekisteri</h1>
            <p class="version">v7 - Yksinkertainen & Toimiva</p>
        </header>

        <div class="section">
            <h2>Hallinta</h2>
            <button onclick="addVahinko()" class="success">+ Uusi vahinko</button>
            <button onclick="exportJSON()" class="success">💾 Vie JSON iCloud:iin</button>
            <button onclick="document.getElementById('importFile').click()" class="success">📂 Lataa JSON</button>
            <input type="file" id="importFile" style="display:none;" accept=".json" onchange="importJSON()">
            <button onclick="exportExcel()" class="success">📊 Vie Excel</button>
            <button onclick="clearAll()" class="danger">🗑️ Tyhjennä kaikki</button>
        </div>

        <div class="section">
            <h2>Vahingot</h2>
            <input type="text" id="searchBox" placeholder="Hae kohteella..." onkeyup="filterTable()">
            <table>
                <thead>
                    <tr>
                        <th>Päivä</th>
                        <th>Kohde</th>
                        <th>Tyyppi</th>
                        <th>Tila</th>
                        <th>Tunnus</th>
                        <th>Liitteet</th>
                        <th>Toiminnot</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <div>
                <label>Päivä:</label>
                <input type="date" id="day">
                <label>Kohde:</label>
                <input type="text" id="target">
                <label>Tyyppi:</label>
                <select id="type" style="width:100%; padding:8px;">
                    <option>Ajoneuvovahinko</option>
                    <option>Liikennevahinko</option>
                    <option>Omaisuusvahinko</option>
                </select>
                <label>Tila:</label>
                <select id="status" style="width:100%; padding:8px;">
                    <option value="">Avoin</option>
                    <option>Käsittelyssä</option>
                    <option>Käsitelty</option>
                    <option>Arkistoitu</option>
                </select>
                <label>Tunnus:</label>
                <input type="text" id="reference">
                <label>Muistiinpanot:</label>
                <textarea id="notes"></textarea>
                <label>Liitteet:</label>
                <div id="attachmentsList"></div>
                <button onclick="document.getElementById('fileInput').click()" class="success">📁 Lisää kuvia</button>
                <input type="file" id="fileInput" multiple style="display:none;" onchange="handleFiles()">
                <br><br>
                <button onclick="saveVahinko()" class="success">💾 Tallenna</button>
                <button onclick="closeModal()">Peruuta</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        let data = JSON.parse(localStorage.getItem('vahinkorekisteri')) || [
            {id:'ZOO-340-1',day:'2026-04-04',target:'ZOO-340',type:'Ajoneuvovahinko',status:'',ref:'',notes:'',files:[]},
            {id:'IZB-283-1',day:'2025-11-04',target:'IZB-283',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'',notes:'',files:[]},
            {id:'EUH-604-1',day:'2026-02-01',target:'EUH-604',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'24-40326-06478-6',notes:'',files:[]},
            {id:'SPH-912-1',day:'2026-01-12',target:'SPH-912',type:'Ajoneuvovahinko',status:'',ref:'',notes:'',files:[]},
            {id:'XPT-996-1',day:'2026-02-14',target:'XPT-996',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'24-40326-03810-7',notes:'',files:[]},
            {id:'CRG-288-1',day:'2025-12-16',target:'CRG-288',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'24-40325-38789-0',notes:'',files:[]},
            {id:'ZOO-340-2',day:'2026-02-18',target:'ZOO-340',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'24-40326-06409-0',notes:'',files:[]},
            {id:'XPT-996-2',day:'2026-03-18',target:'XPT-996',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'24-40326-07468-5',notes:'',files:[]},
            {id:'LPK-763-1',day:'2026-01-21',target:'LPK-763',type:'Liikennevahinko',status:'Käsittelyssä',ref:'24-41026-00477-8',notes:'',files:[]},
            {id:'IRC-438-1',day:'2026-01-23',target:'IRC-438',type:'Liikennevahinko',status:'Käsittelyssä',ref:'24-41026-01737-6',notes:'',files:[]},
            {id:'LPK-763-2',day:'2026-01-24',target:'LPK-763',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'24-40326-04101-5',notes:'',files:[]},
            {id:'SPH-912-2',day:'2026-01-24',target:'SPH-912',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'',notes:'',files:[]},
            {id:'FRA-923-1',day:'2026-01-24',target:'FRA-923',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'24-40326-04766-0',notes:'',files:[]},
            {id:'IZB-283-2',day:'2026-01-24',target:'IZB-283',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'24-40326-04775-9',notes:'',files:[]},
            {id:'SPH-912-3',day:'2026-01-24',target:'SPH-912',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'24-40326-04780-4',notes:'',files:[]},
            {id:'OMA-001',day:'2026-01-24',target:'Omaisuusvahinko',type:'Omaisuusvahinko',status:'Käsitelty',ref:'24-40926-00010-2',notes:'',files:[]},
            {id:'RVB-201-1',day:'2026-03-26',target:'RVB-201',type:'Ajoneuvovahinko',status:'Käsittelyssä',ref:'24-40326-09306-9',notes:'',files:[]},
            {id:'XPT-996-3',day:'2026-04-27',target:'XPT-996',type:'Ajoneuvovahinko',status:'Käsittelyssä',ref:'24-40326-12249-9',notes:'',files:[]},
            {id:'EUH-604-2',day:'2026-04-27',target:'EUH-604',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'24-40326-12495-3',notes:'',files:[]},
            {id:'IRC-438-2',day:'2026-03-30',target:'IRC-438',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'24-40326-10447-7',notes:'Etu oikea alakulma muovi valahtanut',files:[]},
            {id:'ESA-107-1',day:'2026-05-05',target:'ESA-107',type:'Ajoneuvovahinko',status:'Käsittelyssä',ref:'24-40326-13401-9',notes:'',files:[]},
            {id:'CKZ-391-1',day:'',target:'CKZ-391',type:'Ajoneuvovahinko',status:'Käsittelyssä',ref:'',notes:'',files:[]},
            {id:'CKZ-391-2',day:'',target:'CKZ-391',type:'Ajoneuvovahinko',status:'',ref:'',notes:'',files:[]},
            {id:'CKZ-391-3',day:'',target:'CKZ-391',type:'Ajoneuvovahinko',status:'Käsitelty',ref:'',notes:'',files:[]}
        ];
        
        let currentEdit = null;

        function save() { localStorage.setItem('vahinkorekisteri', JSON.stringify(data)); render(); }
        function render() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const filtered = data.filter(v => v.target.toLowerCase().includes(search));
            const html = filtered.map(v => `
                <tr>
                    <td>${v.day}</td>
                    <td>${v.target}</td>
                    <td>${v.type}</td>
                    <td>${v.status || 'Avoin'}</td>
                    <td>${v.ref || '—'}</td>
                    <td>${v.files.length}</td>
                    <td>
                        <button onclick="editVahinko('${v.id}')">✏️ Muokkaa</button>
                        <button class="danger" onclick="deleteVahinko('${v.id}')">🗑️ Poista</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('tableBody').innerHTML = html;
        }

        function filterTable() { render(); }
        
        function editVahinko(id) {
            currentEdit = data.find(v => v.id === id);
            document.getElementById('modalTitle').textContent = currentEdit.target;
            document.getElementById('day').value = currentEdit.day;
            document.getElementById('target').value = currentEdit.target;
            document.getElementById('type').value = currentEdit.type;
            document.getElementById('status').value = currentEdit.status;
            document.getElementById('reference').value = currentEdit.ref;
            document.getElementById('notes').value = currentEdit.notes;
            
            let html = '';
            currentEdit.files.forEach((f, i) => {
                if (f.data.startsWith('data:image')) {
                    html += `<div class="liite"><img src="${f.data}" style="max-width:100px;"><br><strong>${f.name}</strong> <button class="danger" onclick="deleteFile(${i})">Poista</button></div>`;
                } else {
                    html += `<div class="liite"><strong>${f.name}</strong> <button class="danger" onclick="deleteFile(${i})">Poista</button></div>`;
                }
            });
            document.getElementById('attachmentsList').innerHTML = html;
            document.getElementById('modal').classList.add('active');
        }

        function addVahinko() {
            currentEdit = { id: 'NEW-' + Date.now(), day: '', target: '', type: 'Ajoneuvovahinko', status: '', ref: '', notes: '', files: [] };
            document.getElementById('modalTitle').textContent = 'Uusi vahinko';
            document.getElementById('day').value = '';
            document.getElementById('target').value = '';
            document.getElementById('type').value = 'Ajoneuvovahinko';
            document.getElementById('status').value = '';
            document.getElementById('reference').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('attachmentsList').innerHTML = '';
            document.getElementById('modal').classList.add('active');
        }

        function handleFiles() {
            const files = document.getElementById('fileInput').files;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentEdit.files.push({ name: file.name, data: e.target.result });
                    let html = '';
                    currentEdit.files.forEach((f, i) => {
                        if (f.data.startsWith('data:image')) {
                            html += `<div class="liite"><img src="${f.data}" style="max-width:100px;"><br><strong>${f.name}</strong> <button class="danger" onclick="deleteFile(${i})">Poista</button></div>`;
                        } else {
                            html += `<div class="liite"><strong>${f.name}</strong> <button class="danger" onclick="deleteFile(${i})">Poista</button></div>`;
                        }
                    });
                    document.getElementById('attachmentsList').innerHTML = html;
                };
                reader.readAsDataURL(file);
            });
            document.getElementById('fileInput').value = '';
        }

        function deleteFile(i) {
            currentEdit.files.splice(i, 1);
            let html = '';
            currentEdit.files.forEach((f, idx) => {
                if (f.data.startsWith('data:image')) {
                    html += `<div class="liite"><img src="${f.data}" style="max-width:100px;"><br><strong>${f.name}</strong> <button class="danger" onclick="deleteFile(${idx})">Poista</button></div>`;
                } else {
                    html += `<div class="liite"><strong>${f.name}</strong> <button class="danger" onclick="deleteFile(${idx})">Poista</button></div>`;
                }
            });
            document.getElementById('attachmentsList').innerHTML = html;
        }

        function saveVahinko() {
            currentEdit.day = document.getElementById('day').value;
            currentEdit.target = document.getElementById('target').value;
            currentEdit.type = document.getElementById('type').value;
            currentEdit.status = document.getElementById('status').value;
            currentEdit.ref = document.getElementById('reference').value;
            currentEdit.notes = document.getElementById('notes').value;

            if (!currentEdit.day || !currentEdit.target) {
                alert('Täytä päivä ja kohde!');
                return;
            }

            const existing = data.findIndex(v => v.id === currentEdit.id);
            if (existing >= 0) {
                data[existing] = currentEdit;
            } else {
                data.push(currentEdit);
            }
            save();
            closeModal();
        }

        function deleteVahinko(id) {
            if (confirm('Poista vahinko?')) {
                data = data.filter(v => v.id !== id);
                save();
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentEdit = null;
        }

        function exportJSON() {
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `vahingot_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
        }

        function importJSON() {
            const file = document.getElementById('importFile').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    data = imported;
                    save();
                    alert('✅ Tuodaan onnistuneesti!');
                } catch (err) {
                    alert('❌ Virheellinen JSON!');
                }
            };
            reader.readAsText(file);
            document.getElementById('importFile').value = '';
        }

        function exportExcel() {
            const headers = ['Päivä', 'Kohde', 'Tyyppi', 'Tila', 'Tunnus', 'Muistiinpanot'];
            const rows = data.map(v => [v.day, v.target, v.type, v.status || 'Avoin', v.ref || '', v.notes]);
            const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Vahingot');
            XLSX.writeFile(wb, `vahingot_${new Date().toISOString().slice(0, 10)}.xlsx`);
        }

        function clearAll() {
            if (confirm('Poista KAIKKI tiedot?')) {
                data = [];
                save();
            }
        }

        render();
    </script>
</body>
</html>
