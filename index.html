<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a4272">
    <title>Vahinkorekisteri — Vakuutusmeklari v5.3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --navy: #0a4272; --gold: #d4af37; --light-navy: #1a5a9e; --gray-50: #f9fafb; --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-600: #4b5563; --text-primary: #1f2937; --text-secondary: #6b7280; }
        html, body { height: 100%; font-family: 'Outfit', -apple-system, sans-serif; background: linear-gradient(135deg, var(--gray-50) 0%, #f0f4f8 100%); color: var(--text-primary); }
        body { display: flex; flex-direction: column; }
        header { background: linear-gradient(135deg, var(--navy) 0%, var(--light-navy) 100%); color: white; padding: 2rem 1.5rem; border-bottom: 3px solid var(--gold); flex-shrink: 0; }
        header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
        main { flex: 1; display: flex; gap: 1.5rem; padding: 1.5rem; width: 100%; min-height: 0; }
        aside { width: 320px; background: white; border-radius: 12px; padding: 1.5rem; overflow-y: auto; border-left: 4px solid var(--gold); flex-shrink: 0; }
        aside h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--navy); font-weight: 600; }
        .content { flex: 1; display: flex; flex-direction: column; gap: 1.5rem; min-height: 0; }
        .tabs { display: flex; gap: 0.5rem; background: white; padding: 0.5rem; flex-shrink: 0; }
        .tab-btn { padding: 0.8rem 1.2rem; border: none; background: transparent; cursor: pointer; color: var(--text-secondary); border-bottom: 3px solid transparent; font-family: 'Outfit', sans-serif; }
        .tab-btn.active { color: var(--navy); border-bottom-color: var(--gold); }
        .table-container { background: white; border-radius: 12px; display: flex; flex-direction: column; min-height: 0; flex: 1; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: linear-gradient(90deg, var(--navy) 0%, var(--light-navy) 100%); color: white; position: sticky; top: 0; }
        th { padding: 1rem; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
        tbody { overflow-y: auto; flex: 1; }
        tbody tr { border-bottom: 1px solid var(--gray-200); cursor: pointer; transition: all 0.2s ease; }
        tbody tr:hover { background: var(--gray-50); }
        td { padding: 0.9rem 1rem; font-size: 0.9rem; }
        .badge { display: inline-block; padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge.käsitelty { background: #d1fae5; color: #065f46; }
        .badge.käsittelyssä { background: #fef3c7; color: #92400e; }
        .badge.arkistoitu { background: #e5e7eb; color: #374151; }
        .badge.avoin { background: #fee2e2; color: #991b1b; }
        .search-box { position: relative; margin-bottom: 1rem; }
        .search-box input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--gray-300); border-radius: 8px; }
        select { width: 100%; padding: 0.75rem; border: 1px solid var(--gray-300); border-radius: 6px; margin-bottom: 1rem; }
        button { font-family: 'Outfit', sans-serif; border: none; border-radius: 6px; padding: 0.75rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(135deg, var(--navy) 0%, var(--light-navy) 100%); color: white; width: 100%; margin-bottom: 0.75rem; }
        .btn-secondary { background: var(--gray-600); color: white; width: 100%; margin-bottom: 0.75rem; }
        .stat-card { background: white; border-radius: 12px; padding: 1.2rem; border-top: 4px solid var(--gold); }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--navy); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 12px; padding: 2rem; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal-content h3 { color: var(--navy); margin-bottom: 1.5rem; font-size: 1.5rem; }
        .modal-field { margin-bottom: 1.5rem; }
        .modal-field label { display: block; font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; margin-bottom: 0.5rem; }
        .modal-field input, .modal-field textarea, .modal-field select { width: 100%; padding: 0.75rem; border: 1px solid var(--gray-300); border-radius: 6px; font-family: 'Outfit', sans-serif; }
        .modal-field textarea { resize: vertical; min-height: 80px; }
        .muistiinpano { background: #fff3cd; border-left: 4px solid #ffc107; padding: 1rem; margin-bottom: 1rem; border-radius: 6px; }
        .muistiinpano-btn { background: #dc3545; color: white; padding: 0.4rem 0.8rem; font-size: 0.8rem; width: auto; margin-bottom: 0; }
        .liite-item { background: var(--gray-50); padding: 0.75rem; margin-bottom: 0.75rem; border-radius: 6px; display: flex; justify-content: space-between; word-break: break-word; }
        .file-input { display: none; }
        .version { position: fixed; bottom: 1rem; right: 1rem; font-size: 0.75rem; color: var(--text-secondary); background: white; padding: 0.5rem 1rem; border-radius: 20px; }
        @media (max-width: 1024px) { main { flex-direction: column; } aside { width: 100%; } }
    </style>
</head>
<body>
    <header>
        <h1>📋 Vahinkorekisteri v5.3</h1>
        <p>Vakuutusmeklarin vahinkojen hallintajärjestelmä</p>
    </header>

    <main>
        <aside>
            <h2>Suodattimet</h2>
            <div class="search-box"><input type="text" id="searchInput" placeholder="Hae kohteella..."></div>
            <label style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 0.5rem;">Vahinkotyppi</label>
            <select id="typeFilter"><option value="">Kaikki</option><option value="Ajoneuvovahinko">Ajoneuvovahinko</option><option value="Liikennevahinko">Liikennevahinko</option><option value="Omaisuusvahinko">Omaisuusvahinko</option></select>
            <label style="font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 0.5rem;">Käsittelyn tila</label>
            <select id="statusFilter"><option value="">Kaikki</option><option value="Käsitelty">Käsitelty</option><option value="Käsittelyssä">Käsittelyssä</option><option value="Arkistoitu">Arkistoitu</option><option value="avoin">Avoin</option></select>
            <div id="asideStats" style="margin-top: 1.5rem;"></div>
            <button class="btn-primary" onclick="lisääUusiVahinko()">+ Uusi vahinko</button>
            <button class="btn-primary" onclick="lataVarmuuskopio()">⬇ Lataa varmuuskopio</button>
            <button class="btn-secondary" onclick="document.getElementById('restoreFile').click()">⬆ Palauta varmuuskopio</button>
            <input type="file" id="restoreFile" class="file-input" accept=".json" onchange="palauta()">
            <button class="btn-secondary" onclick="exportData()">📊 Vie Excel</button>
        </aside>

        <div class="content">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('list')">Kooste</button>
                <button class="tab-btn" onclick="switchTab('summary')">Yhteenveto</button>
            </div>
            <div id="listTab" class="table-container">
                <table>
                    <thead><tr><th>Vahinkopäivä</th><th>Kohde</th><th>Tyyppi</th><th>Tila</th><th>Vahinkotunnus</th></tr></thead>
                    <tbody id="tableBody"><tr><td colspan="5" style="text-align: center; padding: 3rem;">Ladataan...</td></tr></tbody>
                </table>
            </div>
            <div id="summaryTab" style="display: none;"><div id="statsGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;"></div></div>
        </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <div class="modal-field"><label>Vahinkopäivä</label><input type="date" id="modalPäivä" onchange="saveField('vahinkopäivä', this.value)"></div>
            <div class="modal-field"><label>Kohde</label><input type="text" id="modalKohde" onchange="saveField('kohde', this.value)"></div>
            <div class="modal-field"><label>Tyyppi</label><select id="modalTyyppi" onchange="saveField('tyyppi', this.value)"><option>Ajoneuvovahinko</option><option>Liikennevahinko</option><option>Omaisuusvahinko</option></select></div>
            <div class="modal-field"><label>Käsittelyn tila</label><select id="modalTila" onchange="saveField('käsittelyn_tila', this.value)"><option value="">Avoin</option><option>Käsittelyssä</option><option>Käsitelty</option><option>Arkistoitu</option></select></div>
            <div class="modal-field"><label>Vahinkotunnus</label><input type="text" id="modalTunnus" onchange="saveField('vahinkotunnus', this.value)"></div>
            <div class="modal-field"><label>Muistiinpanot</label><div id="muistiinpanot"></div><textarea id="uusiMuistiinpano" placeholder="Lisää uusi muistiinpano..."></textarea><button onclick="lisääMuistiinpano()" style="margin-top: 0.5rem; width: 100%;">Lisää muistiinpano</button></div>
            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-200);"><label style="font-weight: bold; color: var(--navy); display: block; margin-bottom: 1rem;">Liitteet</label><div id="liitteet"></div><button onclick="showAttachmentOptions()" class="btn-secondary">+ Lisää liite</button></div>
            <div id="attachmentOptions" style="display: none; margin-top: 1rem; gap: 0.75rem;"><button onclick="document.getElementById('fileInput').click()" class="btn-secondary" style="margin-bottom: 0;">📁 Tiedosto</button><button onclick="pasteText()" class="btn-secondary" style="margin-bottom: 0;">📋 Liitä teksti</button><input type="file" id="fileInput" class="file-input" onchange="lisääLiite()"></div>
            <div style="margin-top: 2rem;"><button onclick="closeModal()" class="btn-secondary">Sulje</button></div>
        </div>
    </div>

    <div class="version">v5.3</div>

    <script>
        let currentVahinkoId = null;
        const vahingot = [
            {id:'ZOO-340-1',vahinkopäivä:'04.04.2026',kohde:'ZOO-340',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'',vahinkotunnus:'',muistiinpanot:[],liitteet:[]},
            {id:'IZB-283-1',vahinkopäivä:'04.11.2025',kohde:'IZB-283',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'',muistiinpanot:[],liitteet:[]},
            {id:'EUH-604-1',vahinkopäivä:'01.02.2026',kohde:'EUH-604',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40326-06478-6',muistiinpanot:[],liitteet:[]},
            {id:'SPH-912-1',vahinkopäivä:'12.01.2026',kohde:'SPH-912',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'',vahinkotunnus:'',muistiinpanot:[],liitteet:[]},
            {id:'XPT-996-1',vahinkopäivä:'14.02.2026',kohde:'XPT-996',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40326-03810-7',muistiinpanot:[],liitteet:[]},
            {id:'CRG-288-1',vahinkopäivä:'16.12.2025',kohde:'CRG-288',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40325-38789-0',muistiinpanot:[],liitteet:[]},
            {id:'ZOO-340-2',vahinkopäivä:'18.02.2026',kohde:'ZOO-340',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40326-06409-0',muistiinpanot:[],liitteet:[]},
            {id:'XPT-996-2',vahinkopäivä:'18.03.2026',kohde:'XPT-996',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40326-07468-5',muistiinpanot:[],liitteet:[]},
            {id:'LPK-763-1',vahinkopäivä:'21.01.2026',kohde:'LPK-763',tyyppi:'Liikennevahinko',käsittelyn_tila:'Käsittelyssä',vahinkotunnus:'24-41026-00477-8',muistiinpanot:[],liitteet:[]},
            {id:'IRC-438-1',vahinkopäivä:'23.01.2026',kohde:'IRC-438',tyyppi:'Liikennevahinko',käsittelyn_tila:'Käsittelyssä',vahinkotunnus:'24-41026-01737-6',muistiinpanot:[],liitteet:[]},
            {id:'LPK-763-2',vahinkopäivä:'24.01.2026',kohde:'LPK-763',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40326-04101-5',muistiinpanot:[],liitteet:[]},
            {id:'SPH-912-2',vahinkopäivä:'24.01.2026',kohde:'SPH-912',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'',muistiinpanot:[],liitteet:[]},
            {id:'FRA-923-1',vahinkopäivä:'24.01.2026',kohde:'FRA-923',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40326-04766-0',muistiinpanot:[],liitteet:[]},
            {id:'IZB-283-2',vahinkopäivä:'24.01.2026',kohde:'IZB-283',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40326-04775-9',muistiinpanot:[],liitteet:[]},
            {id:'SPH-912-3',vahinkopäivä:'24.01.2026',kohde:'SPH-912',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40326-04780-4',muistiinpanot:[],liitteet:[]},
            {id:'OMA-001',vahinkopäivä:'24.01.2026',kohde:'Omaisuusvahinko',tyyppi:'Omaisuusvahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40926-00010-2',muistiinpanot:[],liitteet:[]},
            {id:'RVB-201-1',vahinkopäivä:'26.03.2026',kohde:'RVB-201',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsittelyssä',vahinkotunnus:'24-40326-09306-9',muistiinpanot:[],liitteet:[]},
            {id:'XPT-996-3',vahinkopäivä:'27.04.2026',kohde:'XPT-996',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsittelyssä',vahinkotunnus:'24-40326-12249-9',muistiinpanot:[],liitteet:[]},
            {id:'EUH-604-2',vahinkopäivä:'27.04.2026',kohde:'EUH-604',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40326-12495-3',muistiinpanot:[],liitteet:[]},
            {id:'IRC-438-2',vahinkopäivä:'30.03.2026',kohde:'IRC-438',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'24-40326-10447-7',muistiinpanot:['Etu oikea alakulma muovi valahtanut (ehkä sama vahinko 23.1. vahinko','Täytyy selvittää mikä vahinko?'],liitteet:[]},
            {id:'ESA-107-1',vahinkopäivä:'05.05.2026',kohde:'ESA-107',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsittelyssä',vahinkotunnus:'24-40326-13401-9',muistiinpanot:[],liitteet:[]},
            {id:'CKZ-391-1',vahinkopäivä:'',kohde:'CKZ-391',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsittelyssä',vahinkotunnus:'',muistiinpanot:[],liitteet:[]},
            {id:'CKZ-391-2',vahinkopäivä:'',kohde:'CKZ-391',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'',vahinkotunnus:'',muistiinpanot:[],liitteet:[]},
            {id:'CKZ-391-3',vahinkopäivä:'',kohde:'CKZ-391',tyyppi:'Ajoneuvovahinko',käsittelyn_tila:'Käsitelty',vahinkotunnus:'',muistiinpanot:[],liitteet:[]}
        ];

        function dateToNum(d){if(!d)return 0;const[a,b,c]=d.split('.');return parseInt(c+b+a);}
        function renderTable(){const t=document.getElementById('tableBody'),s=document.getElementById('searchInput').value.toLowerCase(),f=document.getElementById('typeFilter').value,st=document.getElementById('statusFilter').value,filtered=vahingot.filter(v=>v.kohde.toLowerCase().includes(s)&&(!f||v.tyyppi===f)&&(!st||v.käsittelyn_tila===st||(!st&&!v.käsittelyn_tila))).sort((a,b)=>dateToNum(b.vahinkopäivä)-dateToNum(a.vahinkopäivä));t.innerHTML=filtered.length?filtered.map(v=>`<tr onclick="openModal('${v.id}')"><td>${v.vahinkopäivä}</td><td><strong>${v.kohde}</strong></td><td>${v.tyyppi}</td><td><span class="badge ${v.käsittelyn_tila==='Käsitelty'?'käsitelty':v.käsittelyn_tila==='Käsittelyssä'?'käsittelyssä':v.käsittelyn_tila==='Arkistoitu'?'arkistoitu':'avoin'}">${v.käsittelyn_tila||'Avoin'}</span></td><td>${v.vahinkotunnus||'—'}</td></tr>`).join(''):'<tr><td colspan="5">Ei tuloksia</td></tr>';}

        function updateStats(){const k=vahingot.filter(v=>v.käsittelyn_tila==='Käsitelty').length,ks=vahingot.filter(v=>v.käsittelyn_tila==='Käsittelyssä').length,a=vahingot.filter(v=>v.käsittelyn_tila==='Arkistoitu').length,o=vahingot.filter(v=>!v.käsittelyn_tila).length;document.getElementById('statsGrid').innerHTML=`<div class="stat-card"><div style="font-size:0.75rem;text-transform:uppercase;color:var(--text-secondary);font-weight:600">Yhteensä</div><div style="font-size:2rem;font-weight:700;color:var(--navy);margin-top:0.5rem">${vahingot.length}</div></div><div class="stat-card"><div style="font-size:0.75rem;text-transform:uppercase;color:var(--text-secondary);font-weight:600">Käsitellyt</div><div style="font-size:2rem;font-weight:700;color:var(--navy);margin-top:0.5rem">${k}</div></div><div class="stat-card"><div style="font-size:0.75rem;text-transform:uppercase;color:var(--text-secondary);font-weight:600">Käsittelyssä</div><div style="font-size:2rem;font-weight:700;color:var(--navy);margin-top:0.5rem">${ks}</div></div><div class="stat-card"><div style="font-size:0.75rem;text-transform:uppercase;color:var(--text-secondary);font-weight:600">Arkistoidut</div><div style="font-size:2rem;font-weight:700;color:var(--navy);margin-top:0.5rem">${a}</div></div><div class="stat-card"><div style="font-size:0.75rem;text-transform:uppercase;color:var(--text-secondary);font-weight:600">Avoimet</div><div style="font-size:2rem;font-weight:700;color:var(--navy);margin-top:0.5rem">${o}</div></div>`;}

        function switchTab(t){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('[id$="Tab"]').forEach(d=>d.style.display='none');if(t==='list'){document.getElementById('listTab').style.display='flex';document.querySelector('[onclick="switchTab(\'list\')"]').classList.add('active');}else{document.getElementById('summaryTab').style.display='block';document.querySelector('[onclick="switchTab(\'summary\')"]').classList.add('active');updateStats();}}

        function openModal(i){currentVahinkoId=i;const v=vahingot.find(x=>x.id===i);document.getElementById('modalTitle').textContent=v.kohde;document.getElementById('modalPäivä').value=v.vahinkopäivä?v.vahinkopäivä.split('.').reverse().join('-'):'';document.getElementById('modalKohde').value=v.kohde;document.getElementById('modalTyyppi').value=v.tyyppi;document.getElementById('modalTila').value=v.käsittelyn_tila;document.getElementById('modalTunnus').value=v.vahinkotunnus;document.getElementById('muistiinpanot').innerHTML=v.muistiinpanot.map((m,idx)=>`<div class="muistiinpano"><div>"${m}"</div><button class="muistiinpano-btn" onclick="poistaMuistiinpano(${idx})">Poista</button></div>`).join('');document.getElementById('uusiMuistiinpano').value='';document.getElementById('liitteet').innerHTML=v.liitteet.length?v.liitteet.map((l,idx)=>`<div class="liite-item"><span>📎 ${l.name}</span><button class="muistiinpano-btn" onclick="poistaLiite(${idx})">Poista</button></div>`).join(''):'<p style="color:#999">Ei liitteitä</p>';document.getElementById('attachmentOptions').style.display='none';document.getElementById('modal').classList.add('active');}

        function closeModal(){document.getElementById('modal').classList.remove('active');localStorage.setItem('vahingot',JSON.stringify(vahingot));}

        function saveField(f,v){const va=vahingot.find(x=>x.id===currentVahinkoId);if(va){if(f==='vahinkopäivä'){va.vahinkopäivä=v?v.split('-').reverse().join('.'):''}else{va[f]=v}renderTable();}}

        function lisääMuistiinpano(){const t=document.getElementById('uusiMuistiinpano').value.trim();if(t){vahingot.find(x=>x.id===currentVahinkoId).muistiinpanot.push(t);openModal(currentVahinkoId);}}

        function poistaMuistiinpano(i){vahingot.find(x=>x.id===currentVahinkoId).muistiinpanot.splice(i,1);openModal(currentVahinkoId);}

        function lisääLiite(){const f=document.getElementById('fileInput').files[0];if(f){const r=new FileReader();r.onload=e=>{vahingot.find(x=>x.id===currentVahinkoId).liitteet.push({name:f.name,data:e.target.result});openModal(currentVahinkoId);};r.readAsDataURL(f);document.getElementById('fileInput').value='';}}

        function poistaLiite(i){vahingot.find(x=>x.id===currentVahinkoId).liitteet.splice(i,1);openModal(currentVahinkoId);}

        function showAttachmentOptions(){document.getElementById('attachmentOptions').style.display=document.getElementById('attachmentOptions').style.display==='none'?'flex':'none';}

        function pasteText(){const t=prompt('Liitä teksti:');if(t){vahingot.find(x=>x.id===currentVahinkoId).liitteet.push({name:'[Teksti] '+new Date().toLocaleString('fi-FI'),data:t});openModal(currentVahinkoId);}}

        function lisääUusiVahinko(){const k=prompt('Kohde:');if(!k)return;const t=prompt('Tyyppi (Ajoneuvovahinko/Liikennevahinko/Omaisuusvahinko):');if(!t)return;const u={id:'UUS-'+Date.now(),vahinkopäivä:new Date().toLocaleDateString('fi-FI'),kohde:k,tyyppi:t,käsittelyn_tila:'',vahinkotunnus:'',muistiinpanot:[],liitteet:[]};vahingot.push(u);renderTable();updateStats();openModal(u.id);}

        function exportData(){const c=[['Vahinkopäivä','Kohde','Tyyppi','Käsittelyn tila','Vahinkotunnus'],...vahingot.map(v=>[v.vahinkopäivä,v.kohde,v.tyyppi,v.käsittelyn_tila||'Avoin',v.vahinkotunnus||''])].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');const b=new Blob([c],{type:'text/csv'}),l=document.createElement('a');l.href=URL.createObjectURL(b);l.download=`vahingot_${new Date().toISOString().slice(0,10)}.csv`;l.click();}

        function lataVarmuuskopio(){const j=JSON.stringify(vahingot,null,2),b=new Blob([j],{type:'application/json'}),l=document.createElement('a');l.href=URL.createObjectURL(b);l.download=`vahingot_varmuuskopio_${new Date().toISOString().slice(0,10)}.json`;l.click();}

        function palauta(){const f=document.getElementById('restoreFile').files[0];if(f){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);vahingot.length=0;vahingot.push(...d);renderTable();updateStats();alert('Varmuuskopio palautettu!');}catch(err){alert('Virhe!');}};r.readAsText(f);document.getElementById('restoreFile').value='';}}

        document.getElementById('searchInput').addEventListener('input',renderTable);document.getElementById('typeFilter').addEventListener('change',renderTable);document.getElementById('statusFilter').addEventListener('change',renderTable);

        const s=localStorage.getItem('vahingot');if(s){const l=JSON.parse(s);l.forEach(item=>{const e=vahingot.find(v=>v.id===item.id);if(e){e.muistiinpanot=item.muistiinpanot||[];e.liitteet=item.liitteet||[];e.vahinkopäivä=item.vahinkopäivä||e.vahinkopäivä;e.käsittelyn_tila=item.käsittelyn_tila||e.käsittelyn_tila;e.vahinkotunnus=item.vahinkotunnus||e.vahinkotunnus;}});}

        renderTable();updateStats();
    </script>
</body>
</html>
